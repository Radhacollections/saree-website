<!DOCTYPE html>
<html>
<head>
    <title>RadhaSree Collections</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">

    <style>
        body {
            margin: 0;
            font-family: Georgia, serif;
            background-color: #f8f5f0;
            padding: 0;
            box-sizing: border-box;
    
        }
       header{
             padding: 0px 0;
          }

        /* Logo Section */
        .logo {
            text-align:Center;
            padding: 0px 0 0px 0;
            background-color: white;
            margin: 0px
        }

        .logo img {
            height: auto;
            width: 220px;
            display: block;
            margin: 0px auto 0px auto;
        }

        /* Navigation */
        nav {
            text-align: Right;
            background-color: white;
            border-bottom: 1px solid #e6d8b5;
            margin: 0;
            padding:0;
        }

        nav a {
            text-decoration: none;
            color: #444;
            margin: 0 30px;
            font-size: 24px;
        }

        nav a:hover {
            color: #bfa046;
        }

        /* Hero Section */
        .hero {
            background-color: #efe8dc;
            text-align: center;
            padding: 10px 5px;
        }

        .hero h1 {
            font-size: 40px;
            color: #bfa046;
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 18px;
            color: #555;
        }

        /* Products */
        .products {
            padding: 60px;
            text-align: center;
        }

        .products h2 {
            color: #bfa046;
            margin-bottom: 40px;
        }

     .product-grid {
    display: grid;
    gap: 20px;
    padding: 20px;
}

/* Mobile - 2 images side by side */
@media (max-width: 768px) {
    .product-grid {
        grid-template-columns: repeat(2, 1fr);
    }
}

/* Desktop */
@media (min-width: 769px) {
    .product-grid {
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    }
}

        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #eee;
        }

        .card img {
            width: 100%;
            border-radius: 6px;
        }

        .card h3 {
            margin: 15px 0 5px;
        }

        .price {
            color: #bfa046;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .whatsapp-btn {
            background-color: #bfa046;
            color: white;
            padding: 10px 18px;
            text-decoration: none;
            border-radius: 5px;
            font-size: 14px;
        }

        .whatsapp-btn:hover {
            background-color: #a68b3c;
        }

        footer {
            background-color: white;
            text-align: center;
            padding: px;
            border-top: 1px solid #e6d8b5;
            margin-top: 60px;
            color: #777;
        }
       .categories {
           display: flex;
           justify-content: center;
           gap: 20px;
           margin: 30px 0;
          flex-wrap: wrap;
       }

       .categories button {
            background: #bfa046;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
      }

      

     .card {
           width: 250px;
           background: white;
           padding: 15px;
           border: 1px solid #eee;
           text-align: center;
    }

    .card img {
         width: 100%;
    }

    .whatsapp-btn {
          background: #bfa046;
          color: white;
          padding: 8px 15px;
          text-decoration: none;
          display: inline-block;
          margin-top: 10px;
    }
 
 
    </style>
</head>
<script>

var phoneNumber = "919959921436"; // put your number

var products = {
  silk: [
    {name: "Multicolor Silk Saree", price: "₹650", image: "s1.jpg"}

  ],

  designer: [
    {name: "Black Designer Saree", price: "₹700", image: "d1.jpg"},
    {name: "Grey Designer Saree", price: "₹800", image: "d2.jpg"},
    {name: "White Designer Saree", price: "₹650", image: "d3.jpg"},
    {name: "Red Designer Saree", price: "₹700", image: "d4.jpg"}


  ],

  semi: [
    {name: "Semi Pattu Gold and Green Saree", price: "₹850", image: "p1.jpg"},
    {name: "Semi Pattu White with blue border Saree", price: "₹700", image: "p2.jpg"},
    {name: "Semi Pattu Parrot Green Saree", price: "₹650", image: "p3.jpg"},
    {name: "Semi Pattu Coffee with purple border Saree", price: "₹950", image: "p4.jpg"}



  ],

  vintage: [
    {name: "Vintage purple Saree", price: "₹750", image: "v1.jpg"}
  ],

  classic: [
    {name: "Classic Orange Saree", price: "₹600", image: "c1.jpg"}
  ]
};
function loadCategory(category) {

  var container = document.getElementById("productsContainer");
  container.innerHTML = "";

  products[category].forEach(function(product){

    var message = "Hi, I want " + product.name + " - " + product.price;
    var whatsappLink = "https://wa.me/" + phoneNumber + "?text=" + encodeURIComponent(message);

    container.innerHTML += `
      <div class="card">
        <img src="${product.image}">
        <h3>${product.name}</h3>
        <p class="price">${product.price}</p>
        <a class="whatsapp-btn" href="${whatsappLink}" target="_blank">
          Order on WhatsApp
        </a>
      </div>
    `;

  });

}  
</script>

<body>

    <!-- Logo -->
    <div class="logo">
        <img src="logo.png" alt="RadhaSree Collections Logo">
    </div>

    <!-- Navigation -->
    <nav>
        <a href="#">Home</a>
        <a href="#">Shop</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>

    <!-- Hero -->
    <section class="hero">
        <h1>Timeless Elegance in Every Weave</h1>
        <p>Sarees Crafted for Your Special Moments</p>
    </section>

    <!-- Products -->
    <section class="products">
        <h2>Featured Collections</h2>
  <div class="categories">
     <button onclick="loadCategory('silk')">Silk Sarees</button>
     <button onclick="loadCategory('designer')">Designer Sarees</button>
     <button onclick="loadCategory('semi')">Semi Pattu Sarees</button>
     <button onclick="loadCategory('vintage')">Vintage Sarees</button>
     <button onclick="loadCategory('classic')">Classic Sarees</button>
  </div>

  <div id="productsContainer" class="product-grid"></div>
    



</section>
    <footer>
        © 2026 RadhaSree Collections | Boutique Sarees
    


</footer>
</body>
</html>
